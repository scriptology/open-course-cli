name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to release, e.g. v0.2.0. Leave empty to build artifacts only without creating a release."
        required: false
        default: ""

permissions:
  contents: write

env:
  RELEASE_VERSION: ${{ github.event.inputs.version || github.ref_name }}

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Enable Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Install protoc
        uses: arduino/setup-protoc@v3.0.0
        with:
          version: "25.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install macOS Intel target
        if: matrix.target == 'x86_64-apple-darwin'
        run: rustup target add x86_64-apple-darwin

      - name: Install Linux dependencies
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Build release binary
        shell: bash
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          VERSION="${{ env.RELEASE_VERSION }}"
          BINARY="target/${{ matrix.target }}/release/open-course-cli"
          mkdir -p dist
          if [ -f "$BINARY" ]; then
            cp "$BINARY" dist/
            cd dist
            tar -czf "open-course-cli-${VERSION}-${{ matrix.target }}.tar.gz" open-course-cli
          else
            echo "Binary not found at $BINARY"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: open-course-cli-${{ env.RELEASE_VERSION }}-${{ matrix.target }}
          path: dist/open-course-cli-${{ env.RELEASE_VERSION }}-${{ matrix.target }}.tar.gz

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Compute release version
        id: meta
        shell: bash
        run: |
          VERSION="${{ inputs.version || github.ref_name }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Checkout release files
        if: startsWith(steps.meta.outputs.version, 'v')
        uses: actions/checkout@v7
        with:
          ref: ${{ steps.meta.outputs.version }}

      - name: Download artifacts
        if: startsWith(steps.meta.outputs.version, 'v')
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: open-course-cli-${{ steps.meta.outputs.version }}-*
          merge-multiple: true

      - name: Copy installer script
        if: startsWith(steps.meta.outputs.version, 'v')
        run: cp installer.sh dist/open-course-cli-installer.sh

      - name: Create Release
        if: startsWith(steps.meta.outputs.version, 'v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.version }}
          name: ${{ steps.meta.outputs.version }}
          files: |
            dist/*.tar.gz
            dist/open-course-cli-installer.sh
          generate_release_notes: true
          draft: false
          prerelease: false
