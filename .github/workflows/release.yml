name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            arch: arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            arch: x86_64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            arch: x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (macOS Intel)
        if: matrix.target == 'x86_64-apple-darwin'
        run: |
          rustup target add x86_64-apple-darwin

      - name: Install cross
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install Linux dependencies
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Build release binary
        shell: bash
        run: |
          if [ "${{ matrix.target }}" = "x86_64-unknown-linux-gnu" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package binary
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          BINARY="target/${{ matrix.target }}/release/open-course-cli"
          if [ "${{ matrix.target }}" = "x86_64-pc-windows-msvc" ]; then
            BINARY="${BINARY}.exe"
          fi
          mkdir -p dist
          if [ -f "$BINARY" ]; then
            cp "$BINARY" dist/
            cd dist
            tar -czf "open-course-cli-${GITHUB_REF_NAME}-${{ matrix.target }}.tar.gz" open-course-cli
          else
            echo "Binary not found at $BINARY"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: open-course-cli-${{ github.ref_name }}-${{ matrix.target }}
          path: dist/open-course-cli-${{ github.ref_name }}-${{ matrix.target }}.tar.gz

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: open-course-cli-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false
